[module/date]
type = internal/date

interval = 1.0

time = %I:%M %P
format-foreground = ${color.fg}
;;date-alt = " %a, %d %b %Y"

format = <label>
label = "%{A1:"$HOME"/.config/i3/scripts/OpenApps --calendar:}%time%%{A}"

######################################################

[module/filesystem]
type = internal/fs

mount-0 = /

interval = 60
fixed-values = false

format-mounted = <label-mounted>
format-mounted-prefix = "’łĆ"
format-mounted-prefix-padding = 3pt
format-mounted-prefix-foreground = ${color.purple}
label-mounted = "%used%"

format-unmounted = <label-unmounted>
format-unmounted-prefix = "’łĆ"
format-unmounted-prefix-padding = 3pt
label-unmounted = %mountpoint%: not mounted

######################################################

[module/network]
type = internal/network
interface = ${system.sys_network_interface}

interval = 3.0
accumulate-stats = true
unknown-as-up = true

format-connected = <label-connected>
format-connected-prefix = "’ć½"
format-connected-prefix-padding = 3pt
format-connected-foreground = ${color.green}

speed-unit = ""
label-connected = "%{A1:"$HOME"/.config/i3/scripts/OpenApps --netmanager:}%netspeed%%{A}"
label-connected-foreground = ${color.amber}

format-disconnected = <label-disconnected>
format-disconnected-prefix = "’ć½"
format-disconnected-prefix-padding = 3pt
format-disconnected-foreground = ${color.red}

label-disconnected = "%{A1:"$HOME"/.config/i3/scripts/OpenApps --netmanager:}Offline%{A}"
label-disconnected-foreground = ${color.red}

######################################################

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true
interval = 5

format-volume = <label-volume>
format-volume-prefix = "’Ć©"
format-volume-prefix-padding = 3pt
format-volume-foreground = ${color.indigo}

label-volume = "%percentage%"
label-volume-foreground = ${color.fg}

format-muted = <label-muted>
format-muted-prefix = "’Ü®"
format-muted-prefix-padding = 3pt
format-muted-foreground = ${color.indigo}
label-muted = "Muted"
label-muted-foreground = ${color.red}

click-right = "$HOME"/.config/i3/scripts/OpenApps --soundcontrol

######################################################

[module/brightness]
type = internal/backlight
card = ${system.sys_graphics_card}

enable-scroll = true
format = <ramp><label>
label = %percentage%%

ramp-0 = ’ā½
ramp-1 = ’ā½
ramp-2 = ’ā½
ramp-3 = ’ā½
ramp-4 = ’ā½
ramp-padding = 3pt
