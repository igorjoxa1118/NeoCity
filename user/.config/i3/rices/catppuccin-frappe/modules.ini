[module/i3]
type = internal/i3

; Only show workspaces defined on the same output as the bar
;
; Useful if you want to show monitor specific workspaces
; on different bars
;
; Default: false
pin-workspaces = true

; This will split the workspace name on ':'
; Default: false
strip-wsnumbers = true

; Sort the workspaces by index instead of the default
; sorting that groups the workspaces by output
; Default: false
index-sort = true

; Create click handler used to focus workspace
; Default: true
enable-click = true

; Create scroll handlers used to cycle workspaces
; Default: true
enable-scroll = true

; Wrap around when reaching the first/last workspace
; Default: true
wrapping-scroll = false

; Set the scroll cycle direction 
; Default: true
reverse-scroll = false

; Use fuzzy (partial) matching on labels when assigning 
; icons to workspaces
; Example: code;ŌÖÜ will apply the icon to all workspaces 
; containing 'code' in the label
; Default: false
fuzzy-match = true

; ws-icon-[0-9]+ = label;icon
; NOTE: The label needs to match the name of the i3 workspace
ws-icon-0 = 1;’äĀ
ws-icon-1 = 2;’ē®
ws-icon-2 = 3;Ņśö
ws-icon-3 = 4;’ü╗
ws-icon-4 = 5;’üä
ws-icon-5 = 6;ŅłŚ
ws-icon-6 = 7;’ģ¬
ws-icon-7 = 8;’éø
ws-icon-8 = 9;’åś
ws-icon-9 = 10;’ŗÜ
ws-icon-default = ’ĪĖ 
; NOTE: You cannot skip icons, e.g. to get a ws-icon-6
; you must also define a ws-icon-5.

; Available tags:
;   <label-state> (default) - gets replaced with <label-(focused|unfocused|visible|urgent)>
;   <label-mode> (default)
format = <label-mode> <label-state>
format-background = ${color.base}
format-font = 2

; Available tokens:
;   %mode%
; Default: %mode%
label-mode = %mode%
label-mode-foreground = ${color.base}
label-mode-background = ${color.yellow}
label-mode-underline = ${color.base}
label-mode-overline = ${color.base}

; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon%  %name%
label-focused = %icon%
label-focused-foreground = ${color.teal}
label-focused-background = ${color.base}
label-focused-underline = ${color.base}
label-focused-overline = ${color.base}

; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon%  %name%
label-unfocused = %icon%
label-unfocused-foreground = ${color.subtext0}

; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon%  %name%
label-visible = %icon%
label-visible-foreground = ${color.teal}

; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon%  %name%
label-urgent = %icon%
label-urgent-foreground = ${color.red}

; Paddings
format-padding = 2
label-mode-padding = 2
label-focused-padding = 2
label-unfocused-padding = 2
label-urgent-padding = 2
label-visible-padding = 2

