[module/bspwm]
type = internal/bspwm

pin-workspaces = true
inline-mode = false

enable-click = true
enable-scroll = true
reverse-scroll = true

fuzzy-match = true

; ws-icon-[0-9]+ = label;icon
; Note that the label needs to correspond with the bspwm workspace name
ws-icon-0 = 1;’äĀ
ws-icon-1 = 2;’ē®
ws-icon-2 = 3;’ü╝
ws-icon-3 = 4;’äĪ
ws-icon-4 = 5;’ĆŁ
ws-icon-5 = 6;’éå
ws-icon-6 = 7;’ģ¬
ws-icon-7 = 8;’Ćō
ws-icon-default = ’ĪĖ

format = <label-state>
format-font = 3

label-monitor = %name%

; If any values for label-dimmed-N are defined, the workspace/mode
; colors will get overridden with those values if the monitor is out of focus
; To only override workspaces in a specific state, use:
;   label-dimmed-focused
;   label-dimmed-occupied
;   label-dimmed-urgent
;   label-dimmed-empty
;label-dimmed-foreground = ${color.subtext0}
;label-dimmed-underline = ${color.yellow}
;label-dimmed-focused-background = ${color.base}

label-focused = %name%
label-focused-foreground = ${color.base}
label-focused-background = ${color.teal}
label-focused-underline = ${color.base}
label-focused-overline = ${color.base}
label-focused-padding = 0

label-occupied = %name%
label-occupied-foreground = ${color.teal}
label-occupied-padding = 0

label-urgent = %name%
label-urgent-foreground = ${color.red}
label-urgent-padding = 0

label-empty = %name%
label-empty-foreground = ${color.subtext0}
label-empty-padding = 0

; Separator in between workspaces
label-separator = ""
label-separator-padding = 0
label-separator-foreground = ${color.mantle}

