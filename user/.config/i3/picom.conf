#################################
#          Animations           #
#################################
# requires https://github.com/jonaburg/picom
# (These are also the default values)
transition-length = 300
transition-pow-x = 0.1
transition-pow-y = 0.1
transition-pow-w = 0.1
transition-pow-h = 0.1
size-transition = true
#--------------------------------------------

round-borders = 12;
corner-radius = 6
rounded-corners-exclude = [
  "window_type = 'menu'",
  "window_type = 'dropdown_menu'",
  "window_type = 'popup_menu'",
  "window_type = 'utility'",
  "class_g = 'Polybar'",
  "class_g = 'Rofi'",
  "class_g = 'Dunst'"
];


shadow = true;
# Set if you want different colour shadows
shadow-red = 0.8;
shadow-green = 0.7;
shadow-blue = 0.5;
shadow-radius = 15;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.2;
shadow-exclude = [
	"class_g = 'Polybar'"
];

fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 8;

inactive-dim=0
focus-exclude = [
	"class_g = 'Rofi'",
];

frame-opacity = 1;
active-opacity = 1;
inactive-opacity = 0.9;
dropdown_menu = { 
  opacity = 1;
  shadow-radius = 0;
  fade = false; 
  }
popup_menu = { 
  opacity = 1;
  shadow-radius = 0;
  fade = false;
  }

opacity-rule = [
  "90:class_g = 'Xfce4-terminal'",
  "90:class_g = 'Deadbeef'",
  "90:class_g = 'XTerm'",
  "90:class_g = 'TelegramDesktop'",
  "90:class_g = 'kitty'",
  "90:class_g = 'discord'",
  "90:class_g = 'Thunar'",
  "90:class_g = 'Caja'", 
  "90:class_g = 'Rofi'", 
  "90:class_g = 'Ymuse'", 
  "90:class_g = 'Nm-applet'",
  "90:class_g = 'NetworkManager'",
  "90:class_g = 'qBittorrent'", 
  "90:class_g = 'transmission-gtk'",
  "90:class_g = 'Polybar'",
  "90:class_g = 'jgmenu_run'", 
  "90:class_g = 'code-oss'" 
];

blur: {
  # requires: https://github.com/ibhagwan/picom
  method = "dual_kawase";
  #method = "kernel";
  strength = 4;
  # deviation = 1.0;
  # kernel = "11x11gaussian";
  background = true;
  background-frame = true;
  background-fixed = true;
  kern = "3x3box";
}

blur-background-exclude = [
	"class_g = 'Maim'",
	"class_g = 'conky'"
];

backend = "glx";
vsync = true;
use-damage = false;
unredir-if-possible = true;

wintypes: {
	dropdown_menu = { 
    opacity = 0.9;
    fade = false;
    shadow = false;
   }
  
	tooltip = { fade = false; 
              shadow = false; 
              opacity = 0.9; 
              focus = true;
              full-shadow = false; 
              }
  
	popup_menu = { 
    opacity = 0.9;
    fade = false;
   }

  dock = { 
    shadow = false; 
    }
  
  dnd = { 
    shadow = false; 
    }
}
