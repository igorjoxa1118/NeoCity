[global/wm]

margin-bottom = 0
margin-top = 0

include-file = ../../scripts/system.ini
include-file = modules.ini

[color]
bg = #2f354b
bg-alt = #BF1D1F28
bg-alt-dark = #15171E
fg = #FDFDFD
selected = #b46bca

trans = #00000000
white = #FFFFFF
black = #000000

red = #F37F97
pink = #EC407A
purple = #C574DD
blue = #8897F4
cyan = #79E6F3
teal = #00B19F
green = #5ADECD
lime = #B9C244
yellow = #F2A272
amber = #FBC02D
orange = #E57C46
brown = #AC8476
grey = #8C8C8C
indigo = #6C77BB
blue-gray = #6D8895

[bar/pam1]
monitor = ${env:MONITOR:}
dpi = ${env:DPI:}
monitor-strict = false
override-redirect = false

bottom = false
fixed-center = true

width = 100%
height = 40

offset-x = 2%
offset-y = 10

background = ${color.bg-alt}
foreground = ${color.fg}

radius = 6

line-size = 2
line-color = ${color.blue}

border-size = 2
border-color = ${color.bg}

padding = 0

module-margin-left = 0
module-margin-right = 10

font-0 = "Material Design Icons Desktop:size=14;3"

modules-left = launcher i3 date r00t updates brightness tray
modules-center = mplayer mpd mpd_control
modules-right = battery sep filesystem sep cpu_bar sep memory_bar sep network sep pulseaudio power

separator =
dim-value = 1.0

;locale = es_MX.UTF-8

wm-restack = i3
enable-ipc = true

cursor-click = pointer 
cursor-scroll = ns-resize

[settings]

screenchange-reload = false

compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over

pseudo-transparency = false
