user "vir0id"

# Required files
db_file            "/home/vir0id/.config/mpd/database"
log_file           "/home/vir0id/.config/mpd/log"

# Optional
bind_to_address    "127.0.0.1"
port               "6600"
music_directory    "/home/vir0id/Music"
playlist_directory "/home/vir0id/.config/mpd/playlists"
pid_file           "/home/vir0id/.config/mpd/pid"
state_file         "/home/vir0id/.config/mpd/state"
sticker_file       "/home/vir0id/.config/mpd/sticker.sql"
mixer_type         "software"
audio_output {
        type            "pulse"
        name            "pulse audio"
}
audio_output {
        type            "fifo"
        name            "my_fifo"
        path            "/tmp/mpd.fifo"
        format          "44100:16:2"
}