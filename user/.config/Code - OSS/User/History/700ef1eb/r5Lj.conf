# An example configuration file for MPD.
# Read the user manual for documentation: http://www.musicpd.org/doc/user/

music_directory		"/home/vir0id/Загрузки/Music/"
playlist_directory	"/home/vir0id/.config/mpd/playlists"
db_file				"/home/vir0id/.config/mpd/mpd.db"
state_file			"/home/vir0id/.config/mpd/mpdstate"
auto_update			"yes"

# For network
bind_to_address "0.0.0.0"
port "6600"

# Inputs

#audio_output {
#        type            "pulse"
#        name            "pulse audio"
#}

audio_output {
        type            "pipewire"
        name            "PipeWire Sound Server"
        mixer_type 		"hardware"
}

audio_output {
  type "httpd"
  name "HTTP mpd"
  encoder "vorbis"
  port "8000"
  bitrate "128"
  format "44100:16:1"
  always_on "yes"
  tags "yes"
}

audio_output {
    type                    "fifo"
    name                    "my_fifo"
    path                    "/tmp/mpd.fifo"
    format                  "44100:16:2"
}
