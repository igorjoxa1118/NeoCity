;; Global WM Settings

[global/wm]

margin-bottom = 0
margin-top = 0
fixed-center = true

include-file = $HOME/Документы/dotfiles/config/polybar/colors.ini
include-file = $HOME/Документы/dotfiles/config/polybar/modules

;; Application Settings

[settings]

throttle-output = 5
throttle-output-for = 10
screenchange-reload = true

; Compositing operators

pseudo-transparency = true
compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over

;; Bar Settings

[bar/top]

modules-left = right1 app left1 sep right1 temperature sep2 sep2 cpu sep2 sep2 memory left1 sep right1 cmus left1 
modules-center = right1 alsa left1 sep sep right1 backlight left1 sep
modules-right = right1 network left1 sep right1 date left1 sep right1 battery left1 sep right1 pamac left1 sep right1 keyboard left1 sep right1 power left1
separator =

monitor =
monitor-fallback =
monitor-strict = false
override-redirect = false
wm-name = 
locale = 

bottom = false
fixed-center = true
padding = 0
width = 100%
height = 31
offset-x = 0%
offset-y = 0%
radius-top = 0
radius-bottom = 0

background = #002d333f
foreground = ${colors.foreground}
dim-value = 1.0

line-size = 2
line-color = ${colors.background}

border-top-size = 8
border-top-color = #002d333f
border-left-size = 8
border-left-color = #002d333f
border-right-size = 8
border-right-color = #002d333f

;font-0 = "Iosevka Nerd Font:size=12;4" 
font-0 = "Iosevka Term:style=Regular:size=12;4"
font-1 = "Iosevka Nerd Font:style=Medium:size=18;4"
font-2 = "feather:size=13;5"

tray-position = right
tray-detached = false
tray-maxsize = 16
tray-background = #002d333f
tray-offset-x = 0
tray-offset-y = 0
tray-padding = 0
tray-scale = 1.0

; Enable support for inter-process messaging
; See the Messaging wiki page for more details.
enable-ipc = true

; Нижние панели

;; Bar Settings

[bar/bottom]

modules-left = right1 terminal web thunar rawtherapee left1 right1 kdenlive left1
modules-center = right1 i3 left1
modules-right = right1 krita gimp blender code telegram kodi left1
separator =

monitor =
monitor-fallback =
monitor-strict = false
override-redirect = false
wm-name = 
locale = 

bottom = true
fixed-center = true
padding = 0
width = 100%
height = 31
offset-x = 0%
offset-y = 0%
radius-top = 0
radius-bottom = 0

background = #002d333f
foreground = ${colors.foreground}
dim-value = 1.0

line-size = 2
line-color = ${colors.background}

border-top-size = 8
border-top-color = #002d333f
border-left-size = 8
border-left-color = #002d333f
border-right-size = 8
border-right-color = #002d333f

;font-0 = "Iosevka Nerd Font:size=12;4" 
font-0 = "Iosevka Term:style=Regular:size=12;4"
font-1 = "Iosevka Nerd Font:style=Medium:size=18;4"
font-2 = "feather:size=13;5"

; Enable support for inter-process messaging
; See the Messaging wiki page for more details.
enable-ipc = true