[global/wm]

margin-bottom = 0
margin-top = 0

include-file = ../../scripts/system.ini
include-file = modules.ini

[color]
bg = #171924
fg = #8c8c8c
mb = #1C1F2D
alpha = #00000000
selected = #333f5e

red = #f7768e
pink = #FF0677
purple = #9C5FFF
blue = #7aa2f7
light-blue = #81a1c1
dark-blue = #5D7CBC
blue-arch = #0A9CF5
cyan = #7dcfff
teal = #00B19F
kivi = #9AD8A5
green = #9ece6a
lime = #B9C244
lime_dark = #51551E
yellow = #e0af68
amber = #FBC02D
orange = #E57C46
brown = #AC8476
grey = #8C8C8C
indigo = #6C77BB
blue-gray = #6D8895

[bar/emi-bar]
monitor = ${env:MONITOR:}
dpi = ${env:DPI:}

monitor-strict = false
override-redirect = false
wm-restack = i3

bottom = false
fixed-center = true

width = 100%
height = 26

offset-x = 2.5%
offset-y = 10

background = ${color.bg}
foreground = ${color.fg}

; radius = 4.0

line-size = 2
line-color = ${color.blue}

border-size = 8px
border-color = ${color.bg}

padding = 1

module-margin-left = 0
module-margin-right = 0

; Text
font-0 = "JetBrainsMono:style=Bold:pixelsize=9;3"
; Icons
font-1 = "Font Awesome 6 Free Solid:size=10;3"
font-2 = "Material Design Icons Desktop:size=11;3"
font-3 = "Material Design Icons Desktop:size=15;4"
; Glyphs
font-4 = "MesloLGS NF:style=Regular:pixelsize=17;4"
font-5 = "Iosevka Term:pixelsize=12;4"
font-6 = "Iosevka Nerd Font:style=Medium:size=18;4"
font-7 = "Iosevka Nerd Font:pixelsize=12;4"
font-8 = "feather:size=13;5"
font-9 = "NotoMono Nerd Font:style=Regular:size=12;2"
font-10 = "BigBlueTerm437 Nerd Font:style=Regular:size=12;2"

;Modules availables but not active: 
;	brightness		weather
modules-left = launcher dots bi keybinds bd sep bi temperature bd sep bi system-nvidia-smi bd sep bi cpu_bar bd sep bi memory_bar bd sep bi filesystem bd sep bi mpd_control bd
modules-center = bi pulseaudio bd sep sep sep cava sep sep sep bi backlight bd
modules-right = bi network_stats bd sep bi mplayer bd sep bi mpd bd sep bi battery network bd sep bi updates bd sep bi systray bd sep power

separator =
dim-value = 1.0

;;locale = es_MX.UTF-8

enable-ipc = true

cursor-click = pointer 
cursor-scroll =

