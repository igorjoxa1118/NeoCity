[module/date]
type = internal/date

interval = 1.0

time = %I:%M %P
;date-alt = " %a, %d %b %y"

format = <label>
label = "%{A1:"$HOME"/.config/i3/scripts/OpenApps --calendar:}%time%%{A}"

######################################################

[module/filesystem]
type = internal/fs

mount-0 = /
interval = 300
fixed-values = true

format-mounted = <label-mounted>
format-mounted-prefix = ’łĆ
format-mounted-prefix-padding-right = 3pt
label-mounted = %used%

format-unmounted = <label-unmounted>
format-unmounted-prefix = ’łĆ
format-unmounted-prefix-padding-right = 3pt
label-unmounted = %mountpoint%: not mounted

######################################################

[module/network]
type = internal/network
interface = ${system.sys_wireless_interface}

interval = 3.0
accumulate-stats = true
unknown-as-up = true

format-connected = <label-connected>
format-connected-prefix = ’ć½
format-connected-prefix-padding-right = 3pt
speed-unit = ""
label-connected = "%{A1:"$HOME"/.config/i3/scripts/OpenApps --netmanager:}%netspeed%%{A}"

format-disconnected = <label-disconnected>
format-disconnected-prefix = ’ć½
format-disconnected-prefix-padding-right = 3pt

label-disconnected = "%{A1:"$HOME"/.config/i3/scripts/OpenApps --netmanager:}Offline%{A}"
label-disconnected-foreground = ${color.red}

######################################################

[module/brightness]
type = internal/backlight
card = ${system.sys_graphics_card}

enable-scroll = false

format = <ramp><label>
label = "%percentage%%"

ramp-0 = ’ā½
ramp-1 = ’ā½
ramp-2 = ’ā½
ramp-font = 2
ramp-padding-right = 3pt
ramp-foreground = ${color.yellow}

######################################################

[module/battery]
type = internal/battery
full-at = 99
battery = ${system.sys_battery}
adapter = ${system.sys_adapter}
poll-interval = 2
time-format = %H:%M

format-charging = <animation-charging><label-charging>
label-charging = "%percentage%% | "

format-discharging = <ramp-capacity><label-discharging>
label-discharging = "%percentage%% | "

format-full = <label-full>
format-full-prefix = ’ēĆ
format-full-prefix-padding-right = 3pt
format-full-prefix-font = 2
